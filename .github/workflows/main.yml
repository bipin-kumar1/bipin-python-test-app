name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t bipin1805/bipin-python-test-app .

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_pass }}" | docker login -u "${{ secrets.Docker_Username }}" --password-stdin

    - name: Push Image
      run: docker push bipin1805/bipin-python-test-app
